name: corn_market
description: E-Commerce Penjualan Jagung - CornMarket
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # ── Supabase ──────────────────────────────────
  supabase_flutter: ^2.3.4      # Auth, DB, Realtime, Storage
  # ─────────────────────────────────────────────

  # Fonts
  google_fonts: ^6.1.0
  image_picker: ^1.1.2          # Upload foto produk/avatar
  file_picker: ^8.0.3           # Upload file alternatif

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0                  # Generate UUID lokal
  shared_preferences: ^2.2.3    # Simpan onboarding flag

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
